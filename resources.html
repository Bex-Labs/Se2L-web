<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Se2L — Resources</title>
  <link href="css/output.css" rel="stylesheet">
  <link href="css/tokens.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Literata:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="css/shell.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 shell-inactive">

  <div class="mobile-topbar">
    <span class="text-base font-semibold">Se2L</span>
    <button id="mobile-menu-btn" class="text-2xl leading-none text-slate-600" aria-label="Open menu">☰</button>
  </div>

  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <div class="app-shell">

    <aside id="app-sidebar" class="app-sidebar">
      <div class="sidebar-brand">
        <svg class="sidebar-brand-mark" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7V12C2 16.97 6.24 21.44 12 22.5C17.76 21.44 22 16.97 22 12V7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 12L11 14L15.5 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="app-sidebar-title">Se2L</span>
      </div>

      <div class="sidebar-identity">
        <div class="sidebar-identity-avatar">👤</div>
        <div class="sidebar-identity-info">
          <span id="sidebar-user-email" class="sidebar-identity-email">Loading…</span>
          <span id="sidebar-role-pill" class="status-pill">Newcomer</span>
        </div>
      </div>

      <nav class="flex flex-col gap-1" style="margin-top: 1rem;">
        <a href="dashboard.html" class="px-3 py-2 rounded-lg text-sm text-slate-600">Dashboard</a>
        <a id="app-manager-link" href="app-manager.html" class="hidden px-3 py-2 rounded-lg text-sm text-slate-600">Manage content</a>
        <a id="super-admin-link" href="super-admin.html" class="hidden px-3 py-2 rounded-lg text-sm text-slate-600">Platform overview</a>
        <a href="resources.html" class="px-3 py-2 rounded-lg text-sm font-medium bg-indigo-50 text-indigo-700">Resources</a>
        <a href="settings.html" class="px-3 py-2 rounded-lg text-sm text-slate-600">Settings</a>
      </nav>
      <button id="signout-btn" class="mt-auto text-xs text-slate-400 underline text-left px-3">Sign out</button>
    </aside>

    <main class="app-main">
      <div class="max-w-2xl mx-auto">

        <a id="back-link" href="index.html" class="text-sm text-slate-500 flex items-center gap-1 mb-6">
          ← Back home
        </a>

    <h1 class="text-xl font-semibold mb-1">Trusted settlement resources</h1>
    <p class="text-sm text-slate-500 mb-4">Browse guidance for healthcare, work, money, and family setup.</p>

    <input id="resource-search" type="search" placeholder="Search resources" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm mb-4" />

    <div id="category-pills" class="flex gap-2 mb-6 flex-wrap"></div>

    <div id="resource-list" class="grid grid-cols-2 gap-3">
      <p class="text-sm text-slate-400 col-span-2">Loading resources...</p>
    </div>

    <!-- SE2L-51: only shown to a logged-in app_manager, checked without
         redirecting anyone else — this page stays fully public otherwise. -->
    <details id="add-resource-section" class="hidden bg-white border border-slate-200 rounded-xl mt-8">
      <summary class="cursor-pointer p-6 font-semibold text-lg">Add a resource</summary>
      <div class="px-6 pb-6">
        <form id="resource-form" class="border-t border-slate-200 pt-4">
          <div class="mb-4">
            <label class="text-sm font-medium block mb-1">Title</label>
            <input id="resource_title" type="text" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="e.g. Registering with a GP" />
          </div>
          <div class="mb-4">
            <label class="text-sm font-medium block mb-1">Description</label>
            <textarea id="resource_description" rows="2" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="Short summary of what this resource covers"></textarea>
          </div>
          <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
              <label class="text-sm font-medium block mb-1">Category</label>
              <select id="resource_category" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
                <option value="Housing">Housing</option>
                <option value="Legal">Legal</option>
                <option value="Banking">Banking</option>
                <option value="Healthcare">Healthcare</option>
                <option value="Education">Education</option>
                <option value="Employment">Employment</option>
                <option value="Social">Social</option>
              </select>
            </div>
            <div>
              <label class="text-sm font-medium block mb-1">Status</label>
              <select id="resource_status" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
                <option value="draft">Draft (not visible to the public yet)</option>
                <option value="published">Published</option>
              </select>
            </div>
          </div>
          <div class="mb-4">
            <label class="text-sm font-medium block mb-1">Link (optional)</label>
            <input id="resource_url" type="url" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="https://gov.uk/..." />
          </div>
          <div class="flex justify-end pt-4 border-t border-slate-200">
            <button type="submit" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-medium">Add resource</button>
          </div>
        </form>
      </div>
    </details>

      </div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/resources.js"></script>

</body>
</html>
