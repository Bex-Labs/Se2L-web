<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Se2L — Log in</title>
  <link href="css/output.css" rel="stylesheet">
  <link href="css/tokens.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Literata:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Page-specific styles for the Stitch login layout — kept local to
       this file since this exact structure (logo lockup, eyebrow label,
       password toggle, footer bar) doesn't exist on any other page yet. */

    .login-page-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .login-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 2rem 1.5rem 0;
    }
    .login-header-mark {
      width: 1.85rem;
      height: 1.85rem;
      color: var(--color-accent-dark);
      flex-shrink: 0;
    }
    .login-header-title {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--color-accent-dark);
    }

    .login-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .login-card {
      width: 100%;
      max-width: 24rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      padding: 2rem;
      box-shadow: 0 1px 3px rgba(21, 28, 35, 0.06);
    }

    .login-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 0.5rem;
    }

    .login-card h1 {
      font-size: 1.375rem;
      margin-bottom: 0.375rem;
    }

    .login-card p.login-sub {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }

    .login-field-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.25rem;
    }
    .login-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--color-text-secondary);
    }
    .login-forgot {
      font-size: 0.75rem;
      color: var(--color-accent);
      font-weight: 500;
    }
    .login-forgot:hover {
      text-decoration: underline;
    }

    .login-password-wrap {
      position: relative;
    }
    .login-password-wrap input {
      padding-right: 2.5rem;
    }
    .login-toggle-password {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
    }
    .login-toggle-password svg {
      width: 1.1rem;
      height: 1.1rem;
    }

    .login-divider-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0 1rem;
    }
    .login-divider-row::before,
    .login-divider-row::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }
    .login-divider-text {
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      white-space: nowrap;
    }

    .login-register-btn {
      display: block;
      width: 100%;
      text-align: center;
      border: 1px solid var(--color-accent);
      color: var(--color-accent-dark);
      background: transparent;
      border-radius: var(--radius-control);
      padding: 0.625rem;
      font-size: 0.875rem;
      font-weight: 600;
    }
    .login-register-btn:hover {
      background: var(--color-accent-bg);
    }

    .login-footer {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--color-border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.375rem 1.25rem;
    }
    .login-footer span,
    .login-footer a {
      font-size: 0.7rem;
      color: var(--color-text-muted);
    }
    .login-footer a:hover {
      color: var(--color-text-secondary);
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">

  <div class="login-page-wrap">

    <div class="login-header">
      <svg class="login-header-mark" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7V12C2 16.97 6.24 21.44 12 22.5C17.76 21.44 22 16.97 22 12V7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M9 12L11 14L15.5 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="login-header-title">Se2L Settlement</span>
    </div>

    <div class="login-main">
      <div class="login-card">

        <p class="login-eyebrow">Official entry portal</p>
        <h1>Welcome back</h1>
        <p class="login-sub">Log in to pick up your settlement journey where you left off.</p>

        <form id="login-form">

          <div class="mb-4">
            <div class="login-field-row">
              <label class="login-label" for="email">Email address</label>
            </div>
            <input id="email" type="email" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="e.g. name@domain.gov.uk" />
          </div>

          <div class="mb-4">
            <div class="login-field-row">
              <label class="login-label" for="password">Password</label>
              <a href="#" class="login-forgot">Forgot?</a>
            </div>
            <div class="login-password-wrap">
              <input id="password" type="password" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="Your password" />
              <button type="button" class="login-toggle-password" id="toggle-password" aria-label="Show password">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="w-full bg-slate-900 text-white rounded-lg py-2.5 text-sm font-medium">Sign in &rarr;</button>

        </form>

        <div class="login-divider-row">
          <span class="login-divider-text">New to Se2L</span>
        </div>

        <a href="onboarding.html" class="login-register-btn">Register account</a>

      </div>
    </div>

    <div class="login-footer">
      <span>Se2L UK &copy; 2026 Se2L UK Settlement Service. All rights reserved.</span>
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
      <a href="#">Contact Support</a>
      <a href="#">Accessibility</a>
    </div>

  </div>

  <script>
    // Show/hide password toggle — presentation-only, doesn't touch
    // login-form's submit handler or any values, so login.js is
    // untouched and unaware this exists.
    document.getElementById("toggle-password").addEventListener("click", function () {
      const pw = document.getElementById("password");
      const isHidden = pw.type === "password";
      pw.type = isHidden ? "text" : "password";
      this.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
