<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Se2L — Log in</title>
  <link href="css/output.css" rel="stylesheet">
  <link href="css/tokens.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Literata:wght@600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  </head>
<body class="min-h-screen bg-slate-50 text-slate-900">

  <div class="max-w-sm mx-auto py-20 px-6">

    <h1 class="text-xl font-semibold mb-1">Welcome back</h1>
    <p class="text-sm text-slate-500 mb-6">Log in to continue your journey.</p>

    <form id="login-form" class="bg-white border border-slate-200 rounded-xl p-6">

      <div class="mb-4">
        <label class="text-sm font-medium block mb-1">Email</label>
        <input id="email" type="email" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="you@example.com" />
      </div>

      <div class="mb-4">
        <label class="text-sm font-medium block mb-1">Password</label>
        <input id="password" type="password" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="Your password" />
      </div>

      <button type="submit" class="w-full bg-slate-900 text-white rounded-lg py-2.5 text-sm font-medium">Log in</button>

      <p class="text-xs text-slate-500 text-center mt-4">
        New here? <a href="onboarding.html" class="text-indigo-600 font-medium">Create your journey</a>
      </p>

    </form>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
