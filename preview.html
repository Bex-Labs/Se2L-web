<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Se2L — Preview as newcomer</title>
  <link href="css/output.css" rel="stylesheet">
  <style>
    .app-shell { display: flex; min-height: 100vh; }

    .app-sidebar {
      position: fixed;
      top: 0; bottom: 0; left: 0;
      z-index: 30;
      width: 224px;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
    }
    .app-sidebar.open { transform: translateX(0); }

    .app-sidebar-title { display: none; }

    .mobile-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
    }

    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.3);
      z-index: 20;
    }
    .sidebar-backdrop.open { display: block; }

    .app-main { flex: 1; width: 100%; padding: 4rem 1.5rem 2.5rem; }

    @media (min-width: 768px) {
      .mobile-topbar { display: none; }
      .app-sidebar {
        position: static;
        transform: none;
        flex-shrink: 0;
      }
      .app-sidebar-title { display: block; }
      .sidebar-backdrop { display: none !important; }
      .app-main { padding: 2.5rem 1.5rem; }
      .app-sidebar nav { margin-top: 0; }
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">

  <div class="mobile-topbar">
    <span class="text-base font-semibold">Se2L</span>
    <button id="mobile-menu-btn" class="text-2xl leading-none text-slate-600" aria-label="Open menu">☰</button>
  </div>

  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <div class="app-shell">

    <aside id="app-sidebar" class="app-sidebar">
      <p class="app-sidebar-title text-lg font-semibold mb-6 px-2">Se2L</p>
      <nav class="flex flex-col gap-1" style="margin-top: 3rem;">
        <a href="dashboard.html" class="px-3 py-2 rounded-lg text-sm text-slate-600">Dashboard</a>
        <a href="app-manager.html" class="px-3 py-2 rounded-lg text-sm text-slate-600">Manage content</a>
      </nav>
      <button id="signout-btn" class="mt-auto text-xs text-slate-400 underline text-left px-3">Sign out</button>
    </aside>

    <main class="app-main">
      <div class="max-w-2xl mx-auto">

        <a href="app-manager.html" class="text-sm text-slate-500 flex items-center gap-1 mb-4">
          ← Back to App Manager
        </a>

    <span class="inline-flex bg-indigo-50 text-indigo-700 text-sm px-4 py-1.5 rounded-full mb-4">
      Preview mode
    </span>

    <h1 class="text-xl font-semibold mb-1">Preview a newcomer profile</h1>
    <p class="text-sm text-slate-500 mb-6">
      Pick a visa type and UK region to see exactly which tasks that profile would see, phase by phase — including drafts, if you want to check content before publishing.
    </p>

    <div class="bg-white border border-slate-200 rounded-xl p-6 mb-8">
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="text-sm font-medium block mb-1">Visa type</label>
          <select id="preview_visa_type" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
            <option value="skilled_worker">Skilled Worker</option>
            <option value="student">Student</option>
          </select>
        </div>
        <div>
          <label class="text-sm font-medium block mb-1">UK region</label>
          <select id="preview_uk_region" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
            <option value="england">England</option>
            <option value="scotland">Scotland</option>
            <option value="wales">Wales</option>
            <option value="northern_ireland">Northern Ireland</option>
          </select>
        </div>
      </div>

      <label class="flex items-center gap-2 text-sm mb-4">
        <input type="checkbox" id="include_unpublished" checked />
        Include draft and in-review tasks (uncheck to see exactly what's live right now)
      </label>

      <button id="load-preview-btn" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-medium">
        Load preview
      </button>
    </div>

    <div id="preview-results"></div>

      </div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/preview.js"></script>

</body>
</html>
