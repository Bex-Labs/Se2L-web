<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Se2L — Super admin</title>
  <link href="css/output.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">

  <div class="max-w-2xl mx-auto py-10 px-6">

    <h1 class="text-xl font-semibold mb-6">Platform overview</h1>

    <div class="grid grid-cols-4 gap-3 mb-6">
      <div class="bg-slate-100 rounded-lg p-4">
        <p class="text-xs text-slate-500">App managers</p>
        <p class="text-xl font-semibold mt-1">2</p>
      </div>
      <div class="bg-slate-100 rounded-lg p-4">
        <p class="text-xs text-slate-500">Visa journeys</p>
        <p class="text-xl font-semibold mt-1">4</p>
      </div>
      <div class="bg-slate-100 rounded-lg p-4">
        <p class="text-xs text-slate-500">UK regions</p>
        <p class="text-xl font-semibold mt-1">4</p>
      </div>
      <div class="bg-slate-100 rounded-lg p-4">
        <p class="text-xs text-slate-500">Content status</p>
        <p class="text-base font-semibold mt-1">Draft</p>
      </div>
    </div>

    <p class="text-sm font-medium mb-2">System checks</p>
    <div class="flex flex-col gap-2">
      <div class="flex justify-between items-center bg-white border border-slate-200 rounded-lg px-4 py-2.5">
        <span class="text-sm">Task content configured</span>
        <span class="text-xs bg-green-50 text-green-700 px-3 py-1 rounded-full">Ready</span>
      </div>
      <div class="flex justify-between items-center bg-white border border-slate-200 rounded-lg px-4 py-2.5">
        <span class="text-sm">Newcomer onboarding flow</span>
        <span class="text-xs bg-green-50 text-green-700 px-3 py-1 rounded-full">Ready</span>
      </div>
      <div class="flex justify-between items-center bg-white border border-slate-200 rounded-lg px-4 py-2.5">
        <span class="text-sm">Backend connection</span>
        <span class="text-xs bg-amber-50 text-amber-700 px-3 py-1 rounded-full">Pending</span>
      </div>
      <div class="flex justify-between items-center bg-white border border-slate-200 rounded-lg px-4 py-2.5">
        <span class="text-sm">Authentication and roles</span>
        <span class="text-xs bg-amber-50 text-amber-700 px-3 py-1 rounded-full">Pending</span>
      </div>
    </div>

  </div>

</body>
</html>
