<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Se2L — Task detail</title>
  <link href="css/output.css" rel="stylesheet">
  <link href="css/tokens.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Literata:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="css/shell.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">

  <div class="mobile-topbar">
    <span class="text-base font-semibold">Se2L</span>
    <button id="mobile-menu-btn" class="text-2xl leading-none text-slate-600" aria-label="Open menu">☰</button>
  </div>

  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <div class="app-shell">

    <aside id="app-sidebar" class="app-sidebar">
      <div class="sidebar-brand">
        <svg class="sidebar-brand-mark" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7V12C2 16.97 6.24 21.44 12 22.5C17.76 21.44 22 16.97 22 12V7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 12L11 14L15.5 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="app-sidebar-title">Se2L</span>
      </div>

      <div class="sidebar-identity">
        <div class="sidebar-identity-avatar">👤</div>
        <div class="sidebar-identity-info">
          <span id="sidebar-user-email" class="sidebar-identity-email">Loading…</span>
          <span id="sidebar-role-pill" class="status-pill">Newcomer</span>
        </div>
      </div>

      <nav class="flex flex-col gap-1" style="margin-top: 1rem;">
        <a href="dashboard.html" class="px-3 py-2 rounded-lg text-sm text-slate-600">Dashboard</a>
        <a id="app-manager-link" href="app-manager.html" class="hidden px-3 py-2 rounded-lg text-sm text-slate-600">Manage content</a>
        <a id="super-admin-link" href="super-admin.html" class="hidden px-3 py-2 rounded-lg text-sm text-slate-600">Platform overview</a>
        <a href="resources.html" class="px-3 py-2 rounded-lg text-sm text-slate-600">Resources</a>
        <a href="settings.html" class="px-3 py-2 rounded-lg text-sm text-slate-600">Settings</a>
      </nav>
      <button id="signout-btn" class="mt-auto text-xs text-slate-400 underline text-left px-3">Sign out</button>
    </aside>

    <main class="app-main">
      <div class="max-w-xl mx-auto">

        <a id="back-link" href="dashboard.html" class="text-sm text-slate-500 flex items-center gap-1 mb-4">
          ← Back to dashboard
        </a>

    <div class="flex justify-between items-start">
      <span id="task-meta" class="text-xs text-red-600 font-medium">Loading...</span>
      <button id="bookmark-btn" class="text-sm text-slate-400 font-medium">☆ Bookmark</button>
    </div>
    <h1 id="task-title" class="text-xl font-semibold mt-1 mb-2"></h1>
    <p id="task-time" class="text-sm text-slate-500 mb-4"></p>

    <div id="task-body" class="bg-white border border-slate-200 rounded-xl p-4 text-sm text-slate-700 mb-4"></div>

    <div id="task-video-container" class="mb-4"></div>

    <div id="task-link-container" class="mb-6"></div>

    <div class="mb-6">
      <label class="text-sm font-medium block mb-1">Your personal notes</label>
      <textarea id="personal-note" rows="3" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="Add a private note for yourself — only you can see this."></textarea>
      <div class="flex justify-end mt-2">
        <button id="save-note-btn" class="text-xs text-indigo-600 font-medium">Save note</button>
      </div>
    </div>

    <div class="flex gap-3">
      <button id="mark-complete-btn" class="flex-1 bg-slate-900 text-white rounded-lg py-2.5 text-sm font-medium">
        ✓ Mark complete
      </button>
    </div>

    <div class="mt-6" id="feedback-section">
      <label class="text-sm font-medium block mb-1">Was this task helpful?</label>
      <div class="flex gap-3 mb-2">
        <button id="thumbs-up-btn" class="flex-1 border border-slate-300 rounded-lg py-2 text-sm font-medium">👍 Yes</button>
        <button id="thumbs-down-btn" class="flex-1 border border-slate-300 rounded-lg py-2 text-sm font-medium">👎 No</button>
      </div>
      <textarea id="feedback-comment" rows="2" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="Optional comment — visible to the team improving this content"></textarea>
      <div class="flex justify-end mt-2">
        <button id="save-feedback-btn" class="text-xs text-indigo-600 font-medium">Save feedback</button>
      </div>
    </div>

      </div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/task-detail.js"></script>

</body>
</html>
