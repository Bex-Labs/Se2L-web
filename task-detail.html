<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Se2L — Task detail</title>
  <link href="css/output.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">

  <div class="max-w-xl mx-auto py-10 px-6">

    <a href="dashboard.html" class="text-sm text-slate-500 flex items-center gap-1 mb-4">
      ← Back to dashboard
    </a>

    <div class="flex justify-between items-start">
      <span id="task-meta" class="text-xs text-red-600 font-medium">Loading...</span>
      <button id="bookmark-btn" class="text-sm text-slate-400 font-medium">☆ Bookmark</button>
    </div>
    <h1 id="task-title" class="text-xl font-semibold mt-1 mb-2"></h1>
    <p id="task-time" class="text-sm text-slate-500 mb-4"></p>

    <div id="task-body" class="bg-white border border-slate-200 rounded-xl p-4 text-sm text-slate-700 mb-4"></div>

    <div id="task-video-container" class="mb-4"></div>

    <div id="task-link-container" class="mb-6"></div>

    <div class="mb-6">
      <label class="text-sm font-medium block mb-1">Your personal notes</label>
      <textarea id="personal-note" rows="3" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="Add a private note for yourself — only you can see this."></textarea>
      <div class="flex justify-end mt-2">
        <button id="save-note-btn" class="text-xs text-indigo-600 font-medium">Save note</button>
      </div>
    </div>

    <div class="flex gap-3">
      <button id="mark-complete-btn" class="flex-1 bg-slate-900 text-white rounded-lg py-2.5 text-sm font-medium">
        ✓ Mark complete
      </button>
    </div>

    <div class="mt-6" id="feedback-section">
      <label class="text-sm font-medium block mb-1">Was this task helpful?</label>
      <div class="flex gap-3 mb-2">
        <button id="thumbs-up-btn" class="flex-1 border border-slate-300 rounded-lg py-2 text-sm font-medium">👍 Yes</button>
        <button id="thumbs-down-btn" class="flex-1 border border-slate-300 rounded-lg py-2 text-sm font-medium">👎 No</button>
      </div>
      <textarea id="feedback-comment" rows="2" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="Optional comment — visible to the team improving this content"></textarea>
      <div class="flex justify-end mt-2">
        <button id="save-feedback-btn" class="text-xs text-indigo-600 font-medium">Save feedback</button>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/task-detail.js"></script>

</body>
</html>
