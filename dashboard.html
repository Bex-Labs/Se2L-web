<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Se2L — Dashboard</title>
  <link href="css/output.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">

  <div class="max-w-2xl mx-auto py-10 px-6">

    <div id="welcome-message" class="mb-6">
      <p class="text-sm text-slate-500">Loading your journey...</p>
    </div>

    <div class="flex justify-end items-center gap-4 mb-4">
      <a id="app-manager-link" href="app-manager.html" class="text-xs text-indigo-600 font-medium hidden">Manage content</a>
      <button id="signout-btn" class="text-xs text-slate-400 underline">Sign out</button>
    </div>

    <div class="flex gap-2 mb-8 overflow-x-auto">
      <div class="flex-1 text-center py-2 px-1 rounded-lg bg-slate-100 text-slate-400">
        <div class="text-xs mt-1">Loading...</div>
      </div>
    </div>

    <div class="flex justify-between items-center mb-4">
      <p class="text-base font-medium">Today's tasks</p>
      <span class="text-sm text-slate-500"></span>
    </div>

    <div class="flex flex-col gap-3">
      <p class="text-sm text-slate-400">Loading tasks...</p>
    </div>
     <div id="upcoming-phase-teaser" class="mt-6"></div>
    <div id="family-section"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/dashboard.js"></script>

</body>
</html>
