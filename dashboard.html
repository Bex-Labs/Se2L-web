<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Se2L — Dashboard</title>
  <link href="css/output.css" rel="stylesheet">
  <style>
    /* Shell layout — plain CSS, not Tailwind, so it works with no build
       step regardless of what output.css was last compiled with. */
    .app-shell { display: flex; min-height: 100vh; }

    .app-sidebar {
      position: fixed;
      top: 0; bottom: 0; left: 0;
      z-index: 30;
      width: 224px;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
    }
    .app-sidebar.open { transform: translateX(0); }

    .app-sidebar-title { display: none; }

    .mobile-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
    }

    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.3);
      z-index: 20;
    }
    .sidebar-backdrop.open { display: block; }

    .app-main { flex: 1; width: 100%; padding: 4rem 1.5rem 2.5rem; }

    /* Desktop: sidebar is a permanent static column, no mobile chrome */
    @media (min-width: 768px) {
      .mobile-topbar { display: none; }
      .app-sidebar {
        position: static;
        transform: none;
        flex-shrink: 0;
      }
      .app-sidebar-title { display: block; }
      .sidebar-backdrop { display: none !important; }
      .app-main { padding: 2.5rem 1.5rem; }
      .app-sidebar nav { margin-top: 0; }
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">

  <!-- Mobile top bar -->
  <div class="mobile-topbar">
    <span class="text-base font-semibold">Se2L</span>
    <button id="mobile-menu-btn" class="text-2xl leading-none text-slate-600" aria-label="Open menu">☰</button>
  </div>

  <!-- Backdrop, mobile only, shown while the drawer is open -->
  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <div class="app-shell">

    <!-- Sidebar: persistent panel on desktop, off-canvas drawer on mobile -->
    <aside id="app-sidebar" class="app-sidebar">
      <p class="app-sidebar-title text-lg font-semibold mb-6 px-2">Se2L</p>
      <nav class="flex flex-col gap-1" style="margin-top: 3rem;">
        <a href="dashboard.html" class="px-3 py-2 rounded-lg text-sm font-medium bg-indigo-50 text-indigo-700">Dashboard</a>
        <a id="app-manager-link" href="app-manager.html" class="hidden px-3 py-2 rounded-lg text-sm text-slate-600">Manage content</a>
      </nav>
      <button id="signout-btn" class="mt-auto text-xs text-slate-400 underline text-left px-3">Sign out</button>
    </aside>

    <!-- Main content — same structure/IDs as before, just inside the shell now -->
    <main class="app-main">
      <div class="max-w-2xl mx-auto">

        <div id="welcome-message" class="mb-6">
          <p class="text-sm text-slate-500">Loading your journey...</p>
        </div>

        <div id="phase-timeline" class="flex gap-2 mb-8 overflow-x-auto">
          <div class="flex-1 text-center py-2 px-1 rounded-lg bg-slate-100 text-slate-400">
            <div class="text-xs mt-1">Loading...</div>
          </div>
        </div>

        <div class="flex justify-between items-center mb-4">
          <p class="text-base font-medium">Today's tasks</p>
          <span id="task-count" class="text-sm text-slate-500"></span>
        </div>

        <div id="task-list" class="flex flex-col gap-3">
          <p class="text-sm text-slate-400">Loading tasks...</p>
        </div>
        <div id="upcoming-phase-teaser" class="mt-6"></div>
        <div id="family-section"></div>

      </div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/dashboard.js"></script>

</body>
</html>
